services:

  service-registry:
    build: ./service-registry
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  product-service:
    build: ./product-service
    expose:
      - "3001"
    environment:
      REGISTRY_URL: http://service-registry:8500
      SERVICE_NAME: product-service   
      PORT: 3001
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  pricing-service:
    build: ./pricing-service
    expose:
      - "3002"
    environment:
      REGISTRY_URL: http://service-registry:8500
      SERVICE_NAME: pricing-service
      PORT: 3002
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      REGISTRY_URL: http://service-registry:8500
    depends_on:
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always