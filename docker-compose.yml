services:

  service-registry:
    build: ./service-registry
    ports:
      - "8500:8500"

  product-service:
    build: ./product-service
    environment:
      REGISTRY_URL: http://service-registry:8500
      HOST: product-service
      PORT: 3001
    depends_on:
      - service-registry

  pricing-service:
    build: ./pricing-service
    environment:
      REGISTRY_URL: http://service-registry:8500
      HOST: pricing-service
      PORT: 3002
    depends_on:
      - service-registry

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      REGISTRY_URL: http://service-registry:8500
    depends_on:
      - service-registry